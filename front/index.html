<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Medicamentos openFDA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-container">
        <h2>Busca de Medicamentos</h2>
        <p>Busque pelo nome, princípio ativo ou fabricante.</p>

        <div class="input-wrapper">
            <input type="text" id="inputBusca" placeholder="Digite aqui..." autocomplete="off">
            <div id="loader" class="loader hidden"></div>
        </div>

        <ul id="listaProdutos" class="hidden"></ul>
        <div id="mensagemErro" class="mensagem hidden">Nenhum medicamento encontrado.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
